<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sample Lib Capture</title>
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 12px;
        font-family: sans-serif;
        font-size: 13px;
        color: #222;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #222;
        color: #fff;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
        word-break: break-word;
      }
      #status a {
        color: #222;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <button id="record-button">Record Audio</button>
    <div id="status"></div>
    <script src="dist/popup.js"></script>
  </body>
</html>
